# Site Settings
title: "Razib Ahsan | Software Engineer"
description: "Senior Software Engineer specializing in distributed systems, cloud architecture, and full-stack development."
url: "https://Razib99.github.io"
baseurl: ""
lang: en

# Author
author:
  name: Md. Razib Ahsan
  email: rajibccz99.ra@gmail.com
  bio: Senior Software Engineer
  github: Razib99
  linkedin: razib-ahsan-090599


# Build Settings
markdown: kramdown
permalink: pretty

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Sass
sass:
  style: compressed
  sass_dir: _sass

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - README.md
  - LICENSE

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
